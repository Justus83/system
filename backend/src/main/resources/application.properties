spring.application.name=backend




server.port=5001

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/salesmatrix?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=mySecretKeyForJwtTokenGenerationThatShouldBeAtLeast256BitsLong
jwt.expiration=86400000
